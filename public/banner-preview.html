<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'AndongKaturi'; src: url('/fonts/Katuri.otf') format('opentype'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 344px; overflow: hidden; }
  .banner { position: relative; width: 344px; height: 70px; }
  .bg { position: absolute; top: 4px; left: 0; width: 344px; height: 63px; }
  .bg img { width: 100%; height: 100%; display: block; }
  .text { position: absolute; top: 13px; left: 16px; font-family: 'AndongKaturi', sans-serif; font-size: 18px; color: #424242; line-height: 1.3; z-index: 2; }
  .worm { position: absolute; top: 0; right: 36px; width: 49px; height: 67px; transform: rotate(4.75deg); z-index: 2; }
  .music-note { position: absolute; top: 12px; right: 90px; width: 22px; height: 22px; transform: rotate(-10.78deg); z-index: 2; }
  .arrow { position: absolute; top: 20px; right: 6px; width: 26px; height: 26px; z-index: 2; }
</style>
</head>
<body>
<div class="banner" id="b">
  <div class="bg"><img src="http://localhost:3845/assets/eef6076048930e421a43c00a4002385872c97533.svg"/></div>
  <div class="text"><p>다른 친구들</p><p>노래도 들어볼까?</p></div>
  <img class="music-note" src="http://localhost:3845/assets/f8d42b91e022d72324db0314a71b0a5dec15217b.svg"/>
  <img class="worm" src="http://localhost:3845/assets/139a7a796cb129896384f6fc68370b3cbb58a1f4.png"/>
  <img class="arrow" src="http://localhost:3845/assets/def1bce9d9d489860bca354acbc53afd1119bab6.svg"/>
</div>
</body>
</html>
